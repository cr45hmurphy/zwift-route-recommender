<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Xert CORS Test</title>
  <style>
    body { font-family: monospace; max-width: 700px; margin: 40px auto; padding: 0 20px; background: #111; color: #eee; }
    h1 { font-size: 1.1rem; color: #aaa; margin-bottom: 24px; }
    label { display: block; margin-bottom: 6px; color: #aaa; font-size: 0.85rem; }
    input { width: 100%; box-sizing: border-box; padding: 8px; background: #222; border: 1px solid #444; color: #eee; font-family: monospace; margin-bottom: 16px; }
    button { padding: 10px 24px; background: #e47000; color: #fff; border: none; cursor: pointer; font-family: monospace; font-size: 1rem; }
    button:hover { background: #c46000; }
    #result { margin-top: 24px; padding: 16px; background: #1a1a1a; border: 1px solid #333; white-space: pre-wrap; font-size: 0.85rem; min-height: 80px; }
    .pass { color: #4caf50; }
    .fail { color: #f44336; }
    .info { color: #aaa; }
  </style>
</head>
<body>
  <h1>Xert CORS Test — does the browser reach xertonline.com directly?</h1>

  <label>Xert Username</label>
  <input type="text" id="username" placeholder="your@email.com">

  <label>Xert Password</label>
  <input type="password" id="password" placeholder="password">

  <label>
    <input type="checkbox" id="useProxy"> Use local proxy (http://localhost:3000)
  </label>
  <br>
  <button onclick="testCors()">Test CORS</button>

  <div id="result"><span class="info">Result will appear here...</span></div>

  <script>
    async function testCors() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const result = document.getElementById('result');

      if (!username || !password) {
        result.innerHTML = '<span class="fail">Enter username and password first.</span>';
        return;
      }

      result.innerHTML = '<span class="info">Sending request to xertonline.com...</span>';

      const useProxy = document.getElementById('useProxy').checked;
      const base = useProxy ? 'http://localhost:3000' : 'https://www.xertonline.com';

      const params = new URLSearchParams({
        grant_type: 'password',
        client_id: 'xert_public',
        client_secret: 'xert_public',
        username,
        password,
      });

      try {
        const res = await fetch(`${base}/oauth/token`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: params.toString(),
        });

        const text = await res.text();
        let parsed;
        try { parsed = JSON.parse(text); } catch { parsed = text; }

        if (res.ok && parsed.access_token) {
          result.innerHTML = `<span class="pass">CORS PASSED — token received.</span>\n\nStatus: ${res.status}\nToken (first 20 chars): ${parsed.access_token.slice(0, 20)}...\n\nNo proxy needed. Proceed with xert.js.`;
        } else {
          result.innerHTML = `<span class="fail">Request reached server but returned an error.</span>\n\nStatus: ${res.status}\nBody: ${JSON.stringify(parsed, null, 2)}\n\nCORS itself is fine — check credentials.`;
        }
      } catch (err) {
        if (err.name === 'TypeError' && err.message.toLowerCase().includes('fetch')) {
          result.innerHTML = `<span class="fail">CORS BLOCKED — browser rejected the request.</span>\n\nError: ${err.message}\n\nNext step: build proxy.js to forward requests through localhost.`;
        } else {
          result.innerHTML = `<span class="fail">Unexpected error:</span>\n\n${err.name}: ${err.message}`;
        }
      }
    }
  </script>
</body>
</html>
