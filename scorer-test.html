<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Scorer Test</title>
  <style>
    body { font-family: monospace; max-width: 900px; margin: 40px auto; padding: 0 20px; background: #111; color: #eee; }
    h1 { font-size: 1.1rem; color: #aaa; }
    h2 { font-size: 0.95rem; color: #e47000; margin-top: 32px; }
    table { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 0.82rem; }
    th { text-align: left; color: #888; border-bottom: 1px solid #333; padding: 4px 8px; }
    td { padding: 4px 8px; border-bottom: 1px solid #222; }
    .score { color: #4caf50; font-weight: bold; }
    .bucket { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 0.8rem; margin-bottom: 6px; }
    .low    { background: #1a3a1a; color: #4caf50; }
    .high   { background: #1a2a3a; color: #64b5f6; }
    .peak   { background: #3a1a1a; color: #ef5350; }
    .recovery { background: #2a2a1a; color: #ffb300; }
    #bucket-display { margin-top: 24px; }
  </style>
</head>
<body>
  <h1>scorer.js — validation harness</h1>
  <p style="color:#888; font-size:0.85rem;">Hard-coded route fixtures run through each bucket. Check that sensible routes surface at the top.</p>

  <div id="bucket-display"></div>

  <script type="module">
    import { scoreRoute, rankRoutes, detectBucket } from './scorer.js';

    // --- Fixture routes (representative sample from current route data) ---
    const ROUTES = [
      { name: "Tempus Fugit",         world: "watopia",        distance: 17.231, elevation: 26,   eventOnly: false, sports: ["cycling"] },
      { name: "Flat Out Fast",        world: "watopia",        distance: 21.382, elevation: 46,   eventOnly: false, sports: ["cycling"] },
      { name: "Road to Sky",          world: "watopia",        distance: 17.496, elevation: 1044, eventOnly: false, sports: ["cycling"] },
      { name: "Tour of Fire and Ice", world: "watopia",        distance: 25.361, elevation: 1164, eventOnly: false, sports: ["cycling"] },
      { name: "London PRL Half",      world: "london",         distance: 69.159, elevation: 1009, eventOnly: false, sports: ["cycling"] },
      { name: "Three Sisters",        world: "watopia",        distance: 48.011, elevation: 896,  eventOnly: false, sports: ["cycling"] },
      { name: "Sea to Tree",          world: "makuri-islands", distance: 3.273,  elevation: 108,  eventOnly: false, sports: ["cycling"] },
      { name: "Mountain Mash",        world: "watopia",        distance: 5.79,   elevation: 335,  eventOnly: false, sports: ["cycling"] },
      { name: "Lutscher",             world: "innsbruck",      distance: 13.704, elevation: 402,  eventOnly: false, sports: ["cycling"] },
      { name: "Grand Central Circuit",world: "new-york",       distance: 6.857,  elevation: 144,  eventOnly: false, sports: ["cycling"] },
      { name: "Big Flat 8",           world: "watopia",        distance: 29.211, elevation: 103,  eventOnly: false, sports: ["cycling"] },
      { name: "Richmond UCI Circuit", world: "richmond",       distance: 16.093, elevation: 133,  eventOnly: false, sports: ["cycling"] },
      { name: "Event Only Route",     world: "watopia",        distance: 50.0,   elevation: 200,  eventOnly: true,  sports: ["cycling"] },
      { name: "Running Route",        world: "watopia",        distance: 5.0,    elevation: 50,   eventOnly: false, sports: ["running"] },
    ];

    // --- detectBucket test cases ---
    const bucketTests = [
      { label: "Low depleted",      tl: { low: 30, high: 20, peak: 10 }, targetXSS: { low: 50, high: 22, peak: 11 } },
      { label: "High depleted",     tl: { low: 48, high: 10, peak: 10 }, targetXSS: { low: 50, high: 25, peak: 11 } },
      { label: "Peak depleted",     tl: { low: 48, high: 23, peak: 4  }, targetXSS: { low: 50, high: 25, peak: 12 } },
      { label: "All at target",     tl: { low: 52, high: 26, peak: 13 }, targetXSS: { low: 50, high: 25, peak: 11 } },
    ];

    const BUCKET_LABELS = { low: 'LOW (aerobic)', high: 'HIGH (threshold)', peak: 'PEAK (neuromuscular)', recovery: 'RECOVERY' };
    const container = document.getElementById('bucket-display');

    // Bucket detection results
    const detectionHtml = bucketTests.map(t => {
      const b = detectBucket(t.tl, t.targetXSS);
      return `<tr><td>${t.label}</td><td><span class="bucket ${b}">${BUCKET_LABELS[b]}</span></td></tr>`;
    }).join('');

    container.innerHTML += `
      <h2>detectBucket results</h2>
      <table>
        <tr><th>Scenario</th><th>Detected bucket</th></tr>
        ${detectionHtml}
      </table>
    `;

    const routeByName = Object.fromEntries(ROUTES.map(route => [route.name, route]));
    const heuristicChecks = [
      {
        label: 'Recovery favors easy spins over long endurance',
        pass: scoreRoute(routeByName['Tempus Fugit'], 'recovery') > scoreRoute(routeByName['London PRL Half'], 'recovery'),
      },
      {
        label: 'HIGH rewards real climbing routes over flat routes',
        pass: scoreRoute(routeByName['Tour of Fire and Ice'], 'high') > scoreRoute(routeByName['Tempus Fugit'], 'high'),
      },
      {
        label: 'PEAK favors short punchy climbs over long sustained ones',
        pass: scoreRoute(routeByName['Sea to Tree'], 'peak') > scoreRoute(routeByName['Lutscher'], 'peak'),
      },
      {
        label: 'PEAK excludes too-climby sustained routes',
        pass: scoreRoute(routeByName['Lutscher'], 'peak') === 0,
      },
    ];

    const heuristicHtml = heuristicChecks.map(check => `
      <tr>
        <td>${check.label}</td>
        <td style="color:${check.pass ? '#4caf50' : '#f44336'}">${check.pass ? 'PASS' : 'FAIL'}</td>
      </tr>
    `).join('');

    container.innerHTML += `
      <h2>Heuristic checks</h2>
      <table>
        <tr><th>Expectation</th><th>Result</th></tr>
        ${heuristicHtml}
      </table>
    `;

    // Route rankings per bucket
    ['low', 'high', 'peak', 'recovery'].forEach(bucket => {
      const ranked = rankRoutes(ROUTES, bucket);
      const rows = ranked.slice(0, 6).map((r, i) => {
        const gr = r.distance > 0 ? (r.elevation / r.distance).toFixed(1) : '—';
        return `<tr>
          <td>${i + 1}</td>
          <td>${r.name}</td>
          <td>${r.distance} km</td>
          <td>${r.elevation} m</td>
          <td>${gr} m/km</td>
          <td class="score">${r.score}</td>
        </tr>`;
      }).join('');

      container.innerHTML += `
        <h2>Bucket: <span class="bucket ${bucket}">${BUCKET_LABELS[bucket]}</span></h2>
        <table>
          <tr><th>#</th><th>Route</th><th>Distance</th><th>Elevation</th><th>Gradient</th><th>Score</th></tr>
          ${rows}
        </table>
      `;
    });

    // Verify filters worked
    const allRanked = rankRoutes(ROUTES, 'low');
    const hasEventOnly = allRanked.some(r => r.eventOnly);
    const hasRunning   = allRanked.some(r => !r.sports.includes('cycling'));
    container.innerHTML += `
      <h2>Filter check</h2>
      <table>
        <tr><th>Check</th><th>Result</th></tr>
        <tr><td>eventOnly routes excluded</td><td style="color:${hasEventOnly ? '#f44336' : '#4caf50'}">${hasEventOnly ? 'FAIL — found eventOnly in results' : 'PASS'}</td></tr>
        <tr><td>Non-cycling routes excluded</td><td style="color:${hasRunning ? '#f44336' : '#4caf50'}">${hasRunning ? 'FAIL — found non-cycling in results' : 'PASS'}</td></tr>
      </table>
    `;
  </script>
</body>
</html>
