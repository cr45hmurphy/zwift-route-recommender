<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Xert API Test</title>
  <style>
    body { font-family: monospace; max-width: 700px; margin: 40px auto; padding: 0 20px; background: #111; color: #eee; }
    h1 { font-size: 1.1rem; color: #aaa; }
    label { display: block; margin-bottom: 6px; color: #aaa; font-size: 0.85rem; }
    input { width: 100%; box-sizing: border-box; padding: 8px; background: #222; border: 1px solid #444; color: #eee; font-family: monospace; margin-bottom: 16px; }
    button { padding: 10px 24px; background: #e47000; color: #fff; border: none; cursor: pointer; font-family: monospace; font-size: 1rem; margin-right: 8px; }
    button:hover { background: #c46000; }
    button.secondary { background: #333; }
    button.secondary:hover { background: #444; }
    #result { margin-top: 24px; padding: 16px; background: #1a1a1a; border: 1px solid #333; white-space: pre-wrap; font-size: 0.82rem; min-height: 80px; }
    .pass { color: #4caf50; }
    .fail { color: #f44336; }
    .info { color: #aaa; }
    .label { color: #888; }
    .value { color: #fff; }
    details { margin-top: 20px; }
    summary { cursor: pointer; color: #aaa; }
    pre { margin-top: 12px; padding: 16px; background: #161616; border: 1px solid #333; white-space: pre-wrap; overflow-wrap: anywhere; font-size: 0.78rem; }
  </style>
</head>
<body>
  <h1>xert.js — live API test</h1>
  <p style="color:#888;font-size:0.85rem;">Requires <code>node scripts/proxy.js</code> running on port 3000.</p>

  <label>Xert Username</label>
  <input type="text" id="username" placeholder="your@email.com">

  <label>Xert Password</label>
  <input type="password" id="password">

  <button onclick="runTest()">Authenticate + fetch training_info</button>
  <button class="secondary" onclick="runTestWithFormat('zwo')">training_info?format=zwo</button>
  <button class="secondary" onclick="probeEndpoint('/oauth/workouts')">GET /oauth/workouts</button>
  <button class="secondary" onclick="probeEndpoint('/oauth/workout/0irdnmnyyxzsbpmg')">GET single workout (MIXEDMODE sample)</button>
  <button class="secondary" onclick="clearAndRun()">Clear token + re-auth</button>

  <div id="result"><span class="info">Result will appear here...</span></div>
  <details id="raw-details" style="display:none">
    <summary>Show raw training_info payload</summary>
    <pre id="raw-json"></pre>
  </details>
  <details id="activity-details" style="display:none">
    <summary>Show today's activity summaries</summary>
    <pre id="activity-json"></pre>
  </details>

  <script type="module">
    import { authenticate, fetchTrainingInfo, parseTrainingData, clearToken, hasToken } from '../app/core/xert.js';
    import { classifyWOTD } from '../app/core/scorer.js';

    const PROXY_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
      ? 'http://localhost:3000'
      : '/.netlify/functions/xert-proxy';
    const TOKEN_KEY = 'xert_token';

    function getStoredToken() {
      return localStorage.getItem(TOKEN_KEY);
    }

    async function fetchWithToken(path) {
      const token = getStoredToken();
      if (!token) throw new Error('No stored token available for activity fetch.');

      const res = await fetch(`${PROXY_BASE}${path}`, {
        headers: { Authorization: `Bearer ${token}` },
      });

      if (!res.ok) {
        throw new Error(`Activity request failed (${res.status}) for ${path}`);
      }

      return res.json();
    }

    function todayRangeUtc() {
      const now = new Date();
      const start = new Date(now);
      start.setHours(0, 0, 0, 0);
      const end = new Date(now);
      end.setHours(23, 59, 59, 999);
      return {
        from: Math.floor(start.getTime() / 1000),
        to: Math.floor(end.getTime() / 1000),
      };
    }

    async function fetchTodaysActivities() {
      const { from, to } = todayRangeUtc();
      const list = await fetchWithToken(`/oauth/activity?from=${from}&to=${to}`);
      const activities = Array.isArray(list.activities) ? list.activities : [];

      const detailed = [];
      for (const activity of activities) {
        if (!activity.path) continue;
        const detail = await fetchWithToken(`/oauth/activity/${activity.path}`);
        detailed.push({
          path: activity.path,
          name: activity.name,
          activity_type: activity.activity_type,
          start_date: activity.start_date,
          summary: detail.summary ?? null,
        });
      }

      return { from, to, count: detailed.length, activities: detailed };
    }

    window.runTest = async function() {
      const result   = document.getElementById('result');
      const rawDetails = document.getElementById('raw-details');
      const rawJson = document.getElementById('raw-json');
      const activityDetails = document.getElementById('activity-details');
      const activityJson = document.getElementById('activity-json');
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      result.innerHTML = '<span class="info">Fetching...</span>';
      rawDetails.style.display = 'none';
      rawJson.textContent = '';
      activityDetails.style.display = 'none';
      activityJson.textContent = '';

      try {
        const raw    = await fetchTrainingInfo(username, password);
        const parsed = parseTrainingData(raw);

        const deficits = {
          low:  (parsed.targetXSS.low  - parsed.tl.low).toFixed(1),
          high: (parsed.targetXSS.high - parsed.tl.high).toFixed(1),
          peak: (parsed.targetXSS.peak - parsed.tl.peak).toFixed(1),
        };

        result.innerHTML = `<span class="pass">SUCCESS</span>

<span class="label">Status:</span>      <span class="value">${parsed.status}</span>
<span class="label">Weight:</span>      <span class="value">${parsed.weight} kg</span>
<span class="label">FTP:</span>         <span class="value">${parsed.signature.ftp} W</span>
<span class="label">LTP:</span>         <span class="value">${parsed.signature.ltp} W</span>
<span class="label">HIE:</span>         <span class="value">${parsed.signature.hie} kJ</span>
<span class="label">PP:</span>          <span class="value">${parsed.signature.pp} W</span>

<span class="label">Training loads:</span>
  Low:   ${parsed.tl.low.toFixed(1)}  (target ${parsed.targetXSS.low.toFixed(1)}, deficit ${deficits.low})
  High:  ${parsed.tl.high.toFixed(1)}  (target ${parsed.targetXSS.high.toFixed(1)}, deficit ${deficits.high})
  Peak:  ${parsed.tl.peak.toFixed(1)}  (target ${parsed.targetXSS.peak.toFixed(1)}, deficit ${deficits.peak})

<span class="label">Workout of the Day (parsed):</span>
  ${parsed.wotd.name ?? '(none)'} ${parsed.wotd.difficulty ? `— difficulty ${parsed.wotd.difficulty}` : ''}
  ${parsed.wotd.description ?? ''}

<span class="label">raw.wotd (full):</span>
  ${JSON.stringify(raw.wotd, null, 2)}

<span class="label">WOTD classification from training_info:</span>
  ${classifyWOTD(raw.wotd, parsed.signature.ftp) ?? '(unclassified)'}

<span class="label">Token cached in localStorage:</span> ${hasToken() ? 'yes' : 'no'}`;

        rawDetails.style.display = 'block';
        rawJson.textContent = JSON.stringify(raw, null, 2);

        if (raw.wotd?.workoutId) {
          const wData = await fetchWithToken(`/oauth/workout/${raw.wotd.workoutId}`);
          const intervals = Array.isArray(wData?.workout) ? wData.workout : [];
          const sprintInterval = intervals
            .filter(i => Number(i?.duration) <= 30 && Number(i?.power) > 0)
            .sort((a, b) => Number(b.power) - Number(a.power))[0] ?? null;
          const enrichedWotd = {
            ...raw.wotd,
            ...wData,
            intervalPower: sprintInterval ? Number(sprintInterval.power) : null,
            intervalDuration: sprintInterval ? Number(sprintInterval.duration) : null,
          };
          const enrichedClass = classifyWOTD(enrichedWotd, parsed.signature.ftp) ?? '(unclassified)';
          result.innerHTML += `\n\n<span class="label">WOTD validation chain:</span>
  workoutId present: yes (${raw.wotd.workoutId})
  workout detail fetched: yes
  intervalPower found: ${enrichedWotd.intervalPower ?? 'no'}
  intervalDuration found: ${enrichedWotd.intervalDuration ?? 'no'}
  classifyWOTD(enriched): ${enrichedClass}

<span class="label">GET /oauth/workout/${raw.wotd.workoutId}:</span>\n${JSON.stringify(wData, null, 2).slice(0, 2000)}`;
        } else {
          result.innerHTML += `\n\n<span class="label">WOTD validation chain:</span>
  workoutId present: no
  workout detail fetched: skipped`;
        }

        const todaysActivities = await fetchTodaysActivities();
        activityDetails.style.display = 'block';
        activityJson.textContent = JSON.stringify(todaysActivities, null, 2);

      } catch (err) {
        result.innerHTML = `<span class="fail">ERROR: ${err.message}</span>`;
        rawDetails.style.display = 'none';
        rawJson.textContent = '';
        activityDetails.style.display = 'none';
        activityJson.textContent = '';
      }
    };

    window.probeEndpoint = async function(path) {
      const result = document.getElementById('result');
      const rawDetails = document.getElementById('raw-details');
      const rawJson = document.getElementById('raw-json');
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      result.innerHTML = `<span class="info">Fetching ${path}...</span>`;

      try {
        let token = localStorage.getItem('xert_token');
        if (!token && username && password) token = await authenticate(username, password);
        if (!token) throw new Error('No token — enter credentials first.');

        const res = await fetch(`${PROXY_BASE}${path}`, {
          headers: { Authorization: `Bearer ${token}` },
        });
        const data = await res.json();
        result.innerHTML = `<span class="pass">SUCCESS ${path} (${res.status})</span>\n\n${JSON.stringify(data, null, 2).slice(0, 4000)}`;
        rawDetails.style.display = 'block';
        rawJson.textContent = JSON.stringify(data, null, 2);
      } catch (err) {
        result.innerHTML = `<span class="fail">ERROR: ${err.message}</span>`;
      }
    };

    window.runTestWithFormat = async function(format) {
      const result = document.getElementById('result');
      const rawDetails = document.getElementById('raw-details');
      const rawJson = document.getElementById('raw-json');
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      result.innerHTML = `<span class="info">Fetching training_info?format=${format}...</span>`;

      try {
        const token = localStorage.getItem('xert_token') || (await authenticate(username, password));
        const res = await fetch(`${PROXY_BASE}/oauth/training_info?format=${format}`, {
          headers: { Authorization: `Bearer ${token}` },
        });
        const raw = await res.json();
        result.innerHTML = `<span class="pass">SUCCESS (format=${format})</span>\n\n<span class="label">raw.wotd:</span>\n${JSON.stringify(raw.wotd, null, 2)}`;
        rawDetails.style.display = 'block';
        rawJson.textContent = JSON.stringify(raw, null, 2);
      } catch (err) {
        result.innerHTML = `<span class="fail">ERROR: ${err.message}</span>`;
      }
    };

    window.clearAndRun = async function() {
      clearToken();
      await window.runTest();
    };
  </script>
</body>
</html>
